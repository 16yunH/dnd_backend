services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dnd-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dnd
      POSTGRES_PASSWORD: dnd
      POSTGRES_DB: dnd
    volumes:
      - dnd-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dnd"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dnd-pgdata:
